spring:
  application:
    name: finance

  datasource:
    url: jdbc:postgresql://localhost:5432/finance
    username: postgres
    password: password
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: create
    show-sql: true
    properties:
      hibernate:
      show_sql: true
      open-in-view: false 

  flyway:
    enabled: false
